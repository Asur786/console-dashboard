command:
  - "python"
  - "-m"
  - "uvicorn"
  - "backend.app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

# DATABRICKS_HOST, DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET are
# automatically injected by the Databricks Apps runtime — no manual setup needed.
# Only set the values that are NOT auto-provided:
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "9d64e46048ba1b6e"
  - name: DATABRICKS_CATALOG
    value: "workspace"
  - name: DATABRICKS_SCHEMA
    value: "default"
  - name: GENIE_SPACE_ID
    value: "01f17ab1d5eb13ef8f24284dcfaee58b"
